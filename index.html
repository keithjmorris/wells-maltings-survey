<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wells Maltings — Event Feedback</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-wrap">
    <header class="site-header">
      <div class="logo-mark" aria-hidden="true">WM</div>
      <div>
        <div class="site-name">Wells Maltings</div>
        <div class="site-sub">Event feedback</div>
      </div>
    </header>

    <main>
      <div id="successMsg" class="alert alert-success" style="display:none;">
        <strong>Thank you!</strong> Your feedback has been recorded. We really appreciate you taking the time.
      </div>

      <form id="surveyForm" novalidate>

        <div class="notice" id="qrNotice" style="display:none;">
          &#x1F4F7; Event details have been pre-filled from the QR code.
        </div>

        <fieldset>
          <legend>About this event</legend>

          <div class="form-row two-col">
            <div class="form-group">
              <label for="eventDate">Date of event <span class="required">*</span></label>
              <input type="date" id="eventDate" name="eventDate" required>
            </div>
            <div class="form-group">
              <label for="eventName">Event name <span class="required">*</span></label>
              <input type="text" id="eventName" name="eventName" placeholder="e.g. Jazz at the Maltings" required>
            </div>
          </div>

          <div class="form-group">
            <label>Overall rating <span class="required">*</span></label>
            <div class="star-row" id="starRow" role="group" aria-label="Rate this event from 1 to 5 stars">
              <button type="button" class="star" data-value="1" aria-label="1 star — poor">★</button>
              <button type="button" class="star" data-value="2" aria-label="2 stars — below average">★</button>
              <button type="button" class="star" data-value="3" aria-label="3 stars — average">★</button>
              <button type="button" class="star" data-value="4" aria-label="4 stars — good">★</button>
              <button type="button" class="star" data-value="5" aria-label="5 stars — excellent">★</button>
            </div>
            <input type="hidden" id="rating" name="rating" value="0">
          </div>

          <div class="form-group">
            <label for="comments">Comments about this event</label>
            <textarea id="comments" name="comments" placeholder="What did you enjoy? Anything that could be improved?"></textarea>
          </div>

          <div class="form-group">
            <label for="suggestions">Suggestions for future events</label>
            <textarea id="suggestions" name="suggestions" placeholder="What would you like to see at Wells Maltings?"></textarea>
          </div>
        </fieldset>

        <fieldset>
          <legend>About you <span class="legend-note">— all optional, helps us plan better</span></legend>

          <div class="form-group">
            <label>How did you hear about this event?</label>
            <div class="chip-group" id="heardGroup" role="group" aria-label="How did you hear about this event">
              <button type="button" class="chip" data-group="heard">Social media</button>
              <button type="button" class="chip" data-group="heard">Email newsletter</button>
              <button type="button" class="chip" data-group="heard">Friend / word of mouth</button>
              <button type="button" class="chip" data-group="heard">Local press</button>
              <button type="button" class="chip" data-group="heard">Poster / flyer</button>
              <button type="button" class="chip" data-group="heard">Website</button>
              <button type="button" class="chip" data-group="heard">Walked past</button>
            </div>
          </div>

          <div class="form-row two-col">
            <div class="form-group">
              <label for="ageGroup">Age group</label>
              <select id="ageGroup" name="ageGroup">
                <option value="">Prefer not to say</option>
                <option>Under 18</option>
                <option>18–25</option>
                <option>26–35</option>
                <option>36–50</option>
                <option>51–65</option>
                <option>Over 65</option>
              </select>
            </div>
            <div class="form-group">
              <label for="visitFreq">How often do you attend?</label>
              <select id="visitFreq" name="visitFreq">
                <option value="">Prefer not to say</option>
                <option>First time</option>
                <option>Occasionally</option>
                <option>Regularly</option>
                <option>Member / subscriber</option>
              </select>
            </div>
          </div>

          <div class="form-row two-col">
            <div class="form-group">
              <label for="postcode">Postcode</label>
              <input type="text" id="postcode" name="postcode" placeholder="e.g. BA5 2PD" maxlength="8">
            </div>
            <div class="form-group">
              <label for="email">Email address</label>
              <input type="email" id="email" name="email" placeholder="For event news and updates">
            </div>
          </div>

          <div class="form-group">
            <label>Would you like to join our mailing list?</label>
            <div class="chip-group" id="mailingGroup" role="group" aria-label="Mailing list preference">
              <button type="button" class="chip single" data-group="mailing">Yes please</button>
              <button type="button" class="chip single" data-group="mailing">No thanks</button>
            </div>
          </div>

          <div class="form-group">
            <label for="accessibility">Accessibility feedback</label>
            <textarea id="accessibility" name="accessibility" rows="3" placeholder="Any accessibility comments for our venue team?"></textarea>
          </div>
        </fieldset>

        <div id="formError" class="alert alert-error" style="display:none;"></div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          Submit feedback
        </button>

      </form>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
