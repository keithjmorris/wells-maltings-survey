<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wells Maltings — Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="page-wrap page-center">
    <div class="login-card">
      <div class="logo-mark" aria-hidden="true">WM</div>
      <h1 class="login-title">Admin area</h1>
      <p class="login-sub">Wells Maltings survey dashboard</p>

      <div id="loginError" class="alert alert-error" style="display:none;"></div>

      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full" id="loginBtn">Sign in</button>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="adminScreen" style="display:none;">

    <div class="admin-bar">
      <div class="admin-bar-left">
        <div class="logo-mark small" aria-hidden="true">WM</div>
        <span class="admin-title">Survey dashboard</span>
      </div>
      <div class="admin-bar-right">
        <span id="adminEmail" class="admin-user"></span>
        <button class="btn btn-small" id="signOutBtn">Sign out</button>
      </div>
    </div>

    <div class="admin-wrap">

      <div class="stat-row" id="statRow">
        <div class="stat-card"><div class="stat-label">Responses</div><div class="stat-val" id="statTotal">—</div></div>
        <div class="stat-card"><div class="stat-label">Avg rating</div><div class="stat-val" id="statAvg">—</div></div>
        <div class="stat-card"><div class="stat-label">Events covered</div><div class="stat-val" id="statEvents">—</div></div>
        <div class="stat-card"><div class="stat-label">Emails collected</div><div class="stat-val" id="statEmails">—</div></div>
      </div>

      <div class="admin-toolbar">
        <div class="filter-row">
          <input type="text" id="filterEvent" placeholder="Filter by event name…">
          <select id="filterRating">
            <option value="">All ratings</option>
            <option value="5">5 stars</option>
            <option value="4">4 stars</option>
            <option value="3">3 stars</option>
            <option value="2">2 stars</option>
            <option value="1">1 star</option>
          </select>
        </div>
        <button class="btn btn-outline" id="csvBtn">&#8595; Download CSV</button>
      </div>

      <div id="loadingMsg" class="empty-state">Loading responses…</div>
      <div id="responseList"></div>

    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
